apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: axilex-games
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ${GCR_HOST}/web:${IMAGE_TAG}
          ports:
            - containerPort: 80
            - containerPort: 443
          env:
            - name: DOMAIN
              # Remplacer par ton domaine public (ex: axilex.games)
              # Caddy obtient le certificat TLS automatiquement via ACME.
              # Pour tester sans domaine, utiliser "localhost" (TLS auto-signé).
              value: "localhost"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
      volumes:
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
