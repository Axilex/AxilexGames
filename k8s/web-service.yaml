apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: axilex-games
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: https-udp
      port: 443
      targetPort: 443
      protocol: UDP
  type: LoadBalancer
